services:
  web:
    build: .
    ports:
      - "127.0.0.1:${PORT:-8000}:8000"
    volumes:
      - ./output:/app/output
      - ./.cache:/app/.cache
      - ./data:/app/data:ro
      - trade-state:/app/state
      - ./config.yaml:/app/config.yaml:ro
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

volumes:
  trade-state:
