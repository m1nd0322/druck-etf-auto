services:
  web:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./output:/app/output
      - ./.cache:/app/.cache
      - ./data:/app/data:ro
      - ./trade_log.db:/app/trade_log.db
      - ./config.yaml:/app/config.yaml:ro
      - ./config.local.yaml:/app/config.local.yaml:ro
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
