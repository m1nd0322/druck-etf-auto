mode:
  dry_run: true
  enable_kiwoom: false

data:
  lookback_years: 3
  price_provider: auto
  cache_csv: true
  cache_dir: ".cache"

universe:
  kr:
    auto_generate: true
    include_leveraged: false
    include_inverse: false
    whitelist_tickers: []
    blacklist_tickers: []
  us:
    auto_generate: false
    tickers:
      - SPY
      - QQQ
      - XLF
      - XLK
      - XBI
      - SMH
      - EEM
      - EWZ
      - HYG
      - IEF
      - TLT
      - SHY
      - UUP
      - ^VIX

macro_filter:
  enabled: true
  thresholds:
    risk_on_score_min: 0.55
    risk_off_score_max: 0.45
  components:
    spy_trend_weight: 0.30
    usd_mom_weight: 0.15
    credit_weight: 0.20
    vix_weight: 0.20
    rates_weight: 0.15

selection:
  top_n_risk_on: 8
  top_n_risk_off: 4
  score_weights:
    momentum: 0.55
    trend: 0.25
    vol_penalty: 0.10
    dd_penalty: 0.10
  max_weight: 0.25

risk_cut:
  enabled: true
  rules:
    below_200sma_cut: true
    trailing_dd_cut: -0.12
    hard_stop_cut: -0.18
  action:
    cut_to_cash: true
    cash_us: SHY
    cash_kr: 130730.KS

rebalance:
  min_trade_weight_diff: 0.01
  round_shares: true
  commission_bps: 1.5

backtest:
  rebalance_frequency: M
  transaction_cost_bps: 1.5
  slippage_bps: 3.0
  market_impact_bps_per_turnover: 5.0
  liquidity_vol_multiplier_bps: 2.0
  starting_capital: 1.0
  benchmark_ticker: SPY
  min_history_days: 252
  strict_point_in_time: true
  drop_incomplete_assets: true
  enforce_delist_exit: true
  universe_timeline_path: ""
  volume_data_path: ""
  adv_window_days: 20
  max_participation_rate: 0.10
  capacity_safety_factor: 0.25
  scenarios:
    enabled: true
    stress_return_shock: -0.05
    vol_multiplier: 1.5
    presets:
      - name: return_shock_and_vol_up
        severity: high
        tags: [stress, drawdown, volatility]
        return_shock: -0.05
        vol_multiplier: 1.5
        benchmark_shock: 0.0
      - name: benchmark_gap_down
        severity: high
        tags: [stress, benchmark, gap]
        return_shock: -0.02
        vol_multiplier: 1.2
        benchmark_shock: -0.04
      - name: volatility_crush
        severity: medium
        tags: [comparison, volatility]
        return_shock: 0.0
        vol_multiplier: 0.7
        benchmark_shock: 0.0
  walkforward:
    enabled: true
    train_days: 252
    test_days: 42
    step_days: 42

strategy_halt:
  enabled: true
  max_cut_asset_ratio: 0.80
  min_risk_score: 0.20
  max_negative_momentum_assets: 3
  performance:
    enabled: true
    min_average_score: 0.00
    max_average_momentum: -0.02
    recent_total_return: -0.03
    benchmark_ticker: SPY
    benchmark_relative_return: -0.05

schedule:
  timezone: "Asia/Seoul"
  report_weekly:
    day_of_week: "sat"
    hour: 9
    minute: 5
  risk_check_daily:
    hour: 16
    minute: 5

notifier:
  telegram:
    enabled: false
    bot_token_env: "TELEGRAM_BOT_TOKEN"
    chat_id_env: "TELEGRAM_CHAT_ID"

kiwoom:
  account_no: ""
  market_order: true
  split_n: 3
  slippage_limit_bps: 30
