mode:
  dry_run: true
  enable_kiwoom: false

data:
  lookback_years: 3
  price_provider: auto
  cache_csv: true
  cache_dir: ".cache"

universe:
  kr:
    auto_generate: true
    include_leveraged: false
    include_inverse: false
    whitelist_tickers: []
    blacklist_tickers: []
  us:
    auto_generate: false
    tickers:
      - SPY
      - QQQ
      - HYG
      - IEF
      - TLT
      - SHY
      - UUP
      - ^VIX
    factor_tickers:
      - MTUM
      - QUAL
      - USMV
      - VLUE
      - SIZE
    sector_tickers:
      - XLF
      - XLK
      - XLE
      - XLV
      - XLI
      - XLP
      - XLY
      - XLU
      - XLB
      - XLRE
      - XBI
      - SMH
    country_tickers:
      - EEM
      - EWZ
      - EFA
      - FXI
      - EWJ
      - INDA

macro_filter:
  enabled: true
  thresholds:
    risk_on_score_min: 0.55
    risk_off_score_max: 0.45
  components:
    spy_trend_weight: 0.30
    usd_mom_weight: 0.15
    credit_weight: 0.20
    vix_weight: 0.20
    rates_weight: 0.15
  rates_overlay:
    up_threshold: 0.02
    down_threshold: -0.02

selection:
  top_n_risk_on: 8
  top_n_risk_off: 4
  regime_factor_bias:
    RISK_ON:
      "MTUM,QUAL": 0.20
      "XLK,SMH,XLY": 0.10
    NEUTRAL:
      "QUAL,USMV": 0.10
    RISK_OFF:
      "USMV,QUAL": 0.20
      "VLUE": 0.05
  score_weights:
    momentum: 0.30
    trend: 0.18
    persistence: 0.12
    recovery: 0.12
    downside_efficiency: 0.12
    relative_strength: 0.16
    capacity_awareness: 0.08
    vol_penalty: 0.10
    dd_penalty: 0.10
  correlation_diversification:
    enabled: true
    lookback: 63
    top_k: 3
    penalty: 0.12
    min_correlation: 0.60
  benchmark_relative_filter:
    enabled: true
    mode: penalty
    min_relative_strength_6m: -0.02
    penalty: 0.25
    apply_to_sleeves: [factor, sector, country]
  sleeve_budget:
    core: 0.50
    factor: 0.25
    sector: 0.35
    country: 0.25
  regime_factor_map:
    enabled: true
    RISK_ON:
      overweight: [MTUM, QUAL]
      underweight: [USMV]
      min_count: 1
      bonus: 0.18
      penalty: 0.08
      relative_strength_gate:
        enabled: true
        min_relative_strength_6m: -0.01
        mode: penalty
        penalty: 0.10
      rates_overlay:
        falling:
          overweight: [MTUM, QUAL]
          underweight: [VLUE]
          bonus: 0.06
          penalty: 0.02
        rising:
          overweight: [VLUE]
          underweight: [MTUM]
          bonus: 0.04
          penalty: 0.05
    NEUTRAL:
      overweight: [QUAL, VLUE]
      underweight: [SIZE]
      min_count: 1
      bonus: 0.10
      penalty: 0.05
      relative_strength_gate:
        enabled: true
        min_relative_strength_6m: -0.015
        mode: penalty
        penalty: 0.06
      rates_overlay:
        falling:
          overweight: [QUAL]
          underweight: []
          bonus: 0.04
          penalty: 0.0
        rising:
          overweight: [VLUE]
          underweight: [QUAL]
          bonus: 0.04
          penalty: 0.03
    RISK_OFF:
      overweight: [USMV, QUAL]
      underweight: [MTUM, SIZE]
      min_count: 1
      bonus: 0.20
      penalty: 0.10
      relative_strength_gate:
        enabled: true
        min_relative_strength_6m: -0.02
        mode: exclude
        penalty: 0.0
      rates_overlay:
        falling:
          overweight: [QUAL]
          underweight: []
          bonus: 0.03
          penalty: 0.0
        rising:
          overweight: [USMV]
          underweight: [MTUM]
          bonus: 0.05
          penalty: 0.03
  regime_sleeve_rotation:
    enabled: true
    RISK_ON:
      top_n: 8
      preferred_sleeves: [factor, sector]
      sleeve_budget:
        core: 0.35
        factor: 0.40
        sector: 0.35
        country: 0.20
      score_tilt:
        factor: 0.18
        sector: 0.12
    NEUTRAL:
      top_n: 5
      preferred_sleeves: [core, factor]
      sleeve_budget:
        core: 0.45
        factor: 0.30
        sector: 0.20
        country: 0.15
      score_tilt:
        core: 0.05
        factor: 0.08
    RISK_OFF:
      top_n: 4
      preferred_sleeves: [core, country]
      sleeve_budget:
        core: 0.60
        factor: 0.15
        sector: 0.10
        country: 0.25
      score_tilt:
        core: 0.10
        country: 0.12
  max_weight: 0.25

risk_cut:
  enabled: true
  rules:
    below_200sma_cut: true
    trailing_dd_cut: -0.12
    hard_stop_cut: -0.18
  action:
    cut_to_cash: true
    cash_us: SHY
    cash_kr: 130730.KS

rebalance:
  min_trade_weight_diff: 0.01
  round_shares: true
  commission_bps: 1.5

backtest:
  rebalance_frequency: M
  transaction_cost_bps: 1.5
  slippage_bps: 3.0
  market_impact_bps_per_turnover: 5.0
  liquidity_vol_multiplier_bps: 2.0
  starting_capital: 1.0
  benchmark_ticker: SPY
  min_history_days: 252
  strict_point_in_time: true
  drop_incomplete_assets: true
  enforce_delist_exit: true
  universe_timeline_path: ""
  volume_data_path: ""
  adv_window_days: 20
  max_participation_rate: 0.10
  capacity_safety_factor: 0.25
  scenarios:
    enabled: true
    stress_return_shock: -0.05
    vol_multiplier: 1.5
    presets:
      - name: return_shock_and_vol_up
        severity: high
        tags: [stress, drawdown, volatility]
        operator_action: reduce risk and review exposures
        review_required: true
        note_template: "Review drawdown-sensitive positions and confirm defensive posture."
        return_shock: -0.05
        vol_multiplier: 1.5
        benchmark_shock: 0.0
      - name: benchmark_gap_down
        severity: high
        tags: [stress, benchmark, gap]
        operator_action: compare active risk versus benchmark and review hedge stance
        review_required: true
        note_template: "Check benchmark-relative weakness and decide whether to de-risk or hold."
        return_shock: -0.02
        vol_multiplier: 1.2
        benchmark_shock: -0.04
      - name: volatility_crush
        severity: medium
        tags: [comparison, volatility]
        operator_action: monitor regime shift assumptions
        review_required: false
        note_template: "Confirm whether lower-volatility assumptions still match current market structure."
        return_shock: 0.0
        vol_multiplier: 0.7
        benchmark_shock: 0.0
  walkforward:
    enabled: true
    train_days: 252
    test_days: 42
    step_days: 42

strategy_halt:
  enabled: true
  max_cut_asset_ratio: 0.80
  min_risk_score: 0.20
  max_negative_momentum_assets: 3
  performance:
    enabled: true
    min_average_score: 0.00
    max_average_momentum: -0.02
    recent_total_return: -0.03
    benchmark_ticker: SPY
    benchmark_relative_return: -0.05

schedule:
  timezone: "Asia/Seoul"
  report_weekly:
    day_of_week: "sat"
    hour: 9
    minute: 5
  risk_check_daily:
    hour: 16
    minute: 5

notifier:
  telegram:
    enabled: false
    bot_token_env: "TELEGRAM_BOT_TOKEN"
    chat_id_env: "TELEGRAM_CHAT_ID"

kiwoom:
  account_no: ""
  market_order: true
  split_n: 3
  slippage_limit_bps: 30
