name: CI

on:
  push:
    branches:
      - main
      - master
      - review/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m compileall -q druck run_auto.py run_report.py run_web.py run_backtest.py

      - name: Run tests
        run: |
          pytest -q

      - name: Import smoke test
        run: |
          python -c "import druck.backtest, druck.config, druck.engine, druck.scheduler, druck.portfolio, druck.macro, druck.web.app"

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t druck-etf-auto .
